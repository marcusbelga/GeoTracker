name: Build & Deploy to Raspberry Pi

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  REPO: ${{ github.repository }}
  # Docker image names must be lowercase
  BACKEND_IMAGE: ghcr.io/marcusbelga/geotracker-backend
  FRONTEND_IMAGE: ghcr.io/marcusbelga/geotracker-frontend

jobs:
  # ─── Lint frontend ──────────────────────────────────────────────────────────
  lint-frontend:
    name: Lint Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: cd frontend && npm ci --legacy-peer-deps
      - run: cd frontend && npx tsc --noEmit

  # ─── Lint backend ───────────────────────────────────────────────────────────
  lint-backend:
    name: Lint Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: cd backend && ruff check .

  # ─── Build & push ARM64 images ──────────────────────────────────────────────
  build-push:
    name: Build & Push Images (ARM64)
    needs: [lint-frontend, lint-backend]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (ARM64 emulation)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./docker/backend.Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ env.BACKEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./docker/frontend.Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ env.FRONTEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_MAPBOX_TOKEN=${{ secrets.MAPBOX_TOKEN }}
            NEXT_PUBLIC_API_URL=https://conflicts.corneel.me

  # ─── Deploy to Raspberry Pi via Cloudflare Tunnel SSH ───────────────────────
  deploy:
    name: Deploy to Raspberry Pi
    needs: build-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cloudflared
        run: |
          curl -fsSL --output cloudflared.deb \
            https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb

      - name: Set up SSH key & tunnel config
        env:
          SSH_PRIVATE_KEY: ${{ secrets.PI_SSH_KEY }}
          PI_USER: ${{ secrets.PI_USER }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          cat > ~/.ssh/config << EOF
          Host pi-tunnel
            HostName ssh.conflicts.corneel.me
            User $PI_USER
            IdentityFile ~/.ssh/deploy_key
            ProxyCommand cloudflared access ssh --hostname %h
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
          EOF

      - name: Copy files to Pi
        run: |
          scp -r -F ~/.ssh/config docker-compose.yml nginx/ pi-tunnel:/opt/geotracker/

      - name: Deploy on Raspberry Pi
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
        run: |
          ssh -F ~/.ssh/config pi-tunnel "bash -s" << ENDSSH
            set -e
            cd /opt/geotracker

            # Login to GHCR (token expanded locally before sending to remote)
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

            # Pull latest images
            docker compose pull

            # Rolling restart: backend first, then frontend, then nginx
            docker compose up -d --no-deps --no-build backend
            sleep 10

            docker compose up -d --no-deps --no-build frontend
            sleep 5

            docker compose up -d --no-deps --no-build nginx

            # Health check
            sleep 5
            curl -f http://localhost/api/v1/health || exit 1

            # Prune old images to save disk space
            docker image prune -f

            echo "Deployment complete!"
          ENDSSH
