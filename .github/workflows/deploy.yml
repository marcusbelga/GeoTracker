name: Build & Deploy to Raspberry Pi

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  REPO: ${{ github.repository }}
  # Docker image names must be lowercase
  BACKEND_IMAGE: ghcr.io/marcusbelga/geotracker-backend
  FRONTEND_IMAGE: ghcr.io/marcusbelga/geotracker-frontend

jobs:
  # ─── Lint frontend ──────────────────────────────────────────────────────────
  lint-frontend:
    name: Lint Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: cd frontend && npm ci --legacy-peer-deps
      - run: cd frontend && npx tsc --noEmit

  # ─── Lint backend ───────────────────────────────────────────────────────────
  lint-backend:
    name: Lint Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: cd backend && ruff check .

  # ─── Build & push ARM64 images ──────────────────────────────────────────────
  build-push:
    name: Build & Push Images (ARM64)
    needs: [lint-frontend, lint-backend]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (ARM64 emulation)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./docker/backend.Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ env.BACKEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./docker/frontend.Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ env.FRONTEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_MAPBOX_TOKEN=${{ secrets.MAPBOX_TOKEN }}
            NEXT_PUBLIC_API_URL=https://conflicts.corneel.me

  # ─── Notify deploy (Watchtower auto-pulls on Pi) ────────────────────────────
  notify:
    name: Notify deploy complete
    needs: build-push
    runs-on: ubuntu-latest
    steps:
      - name: Images pushed to GHCR
        run: |
          echo "✅ Images pushed to GHCR."
          echo "Watchtower on the Pi will detect and deploy within 5 minutes."
          echo "Backend:  ${{ env.BACKEND_IMAGE }}:latest"
          echo "Frontend: ${{ env.FRONTEND_IMAGE }}:latest"
